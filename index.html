<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      #game-container { width: 100vw; height: 100vh; }
      
      /* UI Overlay */
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        font-family: 'Courier New', monospace;
      }
      
      /* Crosshair */
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: #0f0;
      }
      #crosshair::before {
        width: 2px;
        height: 20px;
        left: 9px;
      }
      #crosshair::after {
        width: 20px;
        height: 2px;
        top: 9px;
      }
      
      /* Health Bar */
      #health-container {
        position: absolute;
        bottom: 30px;
        left: 30px;
        color: #0f0;
        font-size: 18px;
      }
      #health-bar {
        width: 200px;
        height: 20px;
        border: 2px solid #0f0;
        margin-top: 5px;
      }
      #health-fill {
        width: 100%;
        height: 100%;
        background: #0f0;
        transition: width 0.3s;
      }
      
      /* Ammo Counter */
      #ammo-container {
        position: absolute;
        bottom: 30px;
        right: 30px;
        color: #0f0;
        font-size: 24px;
        text-align: right;
      }
      #ammo-count { font-size: 48px; }
      
      /* Score */
      #score-container {
        position: absolute;
        top: 30px;
        right: 30px;
        color: #0f0;
        font-size: 24px;
      }
      
      /* Survival Time */
      #survival-container {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: #0ff;
        font-size: 24px;
        text-shadow: 0 0 10px #0ff;
      }
      
      /* Start Screen */
      #start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #0f0;
        font-family: 'Courier New', monospace;
        z-index: 100;
      }
      #start-screen h1 {
        font-size: 64px;
        margin-bottom: 20px;
        text-shadow: 0 0 20px #0f0;
      }
      #start-screen p {
        font-size: 24px;
        margin-bottom: 40px;
      }
      #start-btn {
        padding: 15px 40px;
        font-size: 24px;
        background: transparent;
        border: 2px solid #0f0;
        color: #0f0;
        cursor: pointer;
        pointer-events: auto;
        font-family: 'Courier New', monospace;
      }
      #start-btn:hover {
        background: #0f0;
        color: #000;
      }
      
      /* Instructions */
      #instructions {
        position: absolute;
        top: 30px;
        left: 30px;
        color: #0f0;
        font-size: 14px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
      <div id="crosshair"></div>
      <div id="instructions">
        WASD - Move<br>
        Mouse - Look<br>
        Click - Shoot<br>
        R - Reload<br>
        B - Buy Medikit<br>
        Space - Jump<br>
        ESC - Pause
      </div>
      <div id="score-container">SCORE: <span id="score">0</span></div>
      <div id="survival-container">TIME: <span id="survival-time">0:00</span></div>
      <div id="health-container">
        HEALTH
        <div id="health-bar"><div id="health-fill"></div></div>
      </div>
      <div id="ammo-container">
        AMMO<br>
        <span id="ammo-count">20</span> / 20
      </div>
    </div>
    
    <div id="start-screen">
      <h1>Himanshu the beast </h1>
      <p>Click to start</p>
      <button id="start-btn">START GAME</button>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
